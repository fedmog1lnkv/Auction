services:
  frontend:
    image: auction-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    environment:
      BACKEND_URL: ${BACKEND_URL:?Set BACKEND_URL in .env}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped
