services:
  postgres:
    image: postgres:17-alpine
    container_name: auction-postgres
    environment:
      POSTGRES_DB: auction
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d auction" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web.api:
    image: web.api
    build:
      context: .
      dockerfile: src/Web.Api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=auction;Username=postgres;Password=postgres
    ports:
      - "8080:8080"

  frontend-vue:
    image: frontend-vue
    build:
      context: ./frontend-vue
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://web.api:8080}
    depends_on:
      - web.api
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres-data:
