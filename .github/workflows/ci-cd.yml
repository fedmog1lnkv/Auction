name: CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "24.x"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/auction-web-api
  FRONTEND_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/auction-frontend

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Auction.slnx

      - name: Run tests
        run: dotnet test Auction.slnx --configuration Release --no-restore

  build_web_api:
    name: Build Web API
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/Web.Api/Web.Api.csproj

      - name: Build
        run: dotnet build src/Web.Api/Web.Api.csproj --configuration Release --no-restore

  build_frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend-vue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  publish:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    needs: build_web_api
    permissions:
      contents: read
      packages: write

    outputs:
      image_ref: ${{ steps.image_ref.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Web.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Export immutable image reference
        id: image_ref
        run: echo "value=${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  publish_frontend:
    name: Build and Push Frontend image
    runs-on: ubuntu-latest
    needs: build_frontend
    permissions:
      contents: read
      packages: write

    outputs:
      image_ref: ${{ steps.image_ref.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: frontend-vue
          file: frontend-vue/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.FRONTEND_VITE_API_URL }}

      - name: Export immutable image reference
        id: image_ref
        run: echo "value=${{ env.FRONTEND_IMAGE_NAME }}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_REF: ${{ needs.publish.outputs.image_ref }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE_REF,GHCR_USERNAME,GHCR_TOKEN,DEPLOY_PATH
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            export IMAGE_REF="${IMAGE_REF}"
            docker compose -f compose.prod.yaml pull
            docker compose -f compose.prod.yaml up -d --remove-orphans
            docker image prune -f

  deploy_frontend:
    name: Deploy Frontend to server
    runs-on: ubuntu-latest
    needs: publish_frontend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          FRONTEND_IMAGE_REF: ${{ needs.publish_frontend.outputs.image_ref }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          FRONTEND_DEPLOY_PATH: ${{ secrets.FRONTEND_DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: FRONTEND_IMAGE_REF,GHCR_USERNAME,GHCR_TOKEN,FRONTEND_DEPLOY_PATH
          script_stop: true
          script: |
            set -euo pipefail
            FRONTEND_DEPLOY_DIR="${FRONTEND_DEPLOY_PATH/#\~/$HOME}"
            mkdir -p "$FRONTEND_DEPLOY_DIR"
            cd "$FRONTEND_DEPLOY_DIR"

            if [ ! -f .env ]; then
              echo "Missing .env in $FRONTEND_DEPLOY_DIR"
              exit 1
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            export FRONTEND_IMAGE_REF="${FRONTEND_IMAGE_REF}"
            docker compose --env-file .env pull
            docker compose --env-file .env up -d --remove-orphans
            docker image prune -f
