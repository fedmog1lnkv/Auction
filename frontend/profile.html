<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Профиль</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="profile">

<header class="header">
    <a class="logo brand" href="index.html">
        <span class="logo-icon logoMark">⚖</span>
        <span class="logo-text">Аукцион</span>
    </a>

    <nav class="nav">
        <a class="nav-link" href="index.html">Аукционы</a>
        <a class="nav-link" href="bids.html">Мои ставки</a>
        <a class="nav-link" href="how-it-works.html">Как это работает</a>
        <a class="nav-link" href="notifications.html">Уведомления</a>
        <a class="nav-link" href="settings.html">Настройки</a>
    </nav>

    <form class="search" id="searchForm">
        <input type="search" id="searchInput" placeholder="Поиск">
    </form>

    <a class="profile-link userRound" href="profile.html" aria-label="Профиль">
        <span class="profile-icon"></span>
    </a>
</header>

<main class="main page">
    <section class="page-title">
        <h1>Профиль</h1>
        <p>Основные данные аккаунта</p>
    </section>

    <div class="profileGrid profileGridSingle">
        <section class="contentCol">
            <div class="personCard card">
                <div class="bigAvatar"><span data-user-initials>П</span></div>
                <div class="personInfo">
                    <h2 data-user-name>Пользователь</h2>
                    <p class="muted" data-user-email></p>
                    <div class="actionsLine">
                        <a href="settings.html" class="btn outline">Настройки</a>
                        <button class="btn danger" type="button" data-logout>Выйти</button>
                    </div>
                </div>
            </div>

            <div class="card panelPad">
                <h2>Мои лоты</h2>
                <div id="myLotsBlock">
                    <p class="empty-message">Нет лотов</p>
                </div>
            </div>

        </section>
    </div>
</main>

<script src="app.js"></script>
</body>
</html>
