<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Авторизация</title>
    <link rel="stylesheet" href="style.css">  <!--Связываем с классом href="" CSS-->
</head>
<body>

    <main class="Form">
        <a class="login-home-link" href="index.html">← К аукционам</a>

            <div class="Form1">
                <h1>Добро пожаловать в личный кабинет</h1>
                <p>Войти или зарегестрировать новый аккаунт.</p>
            </div>

                <div class="Form2">
                    <button class="tabBtn active" type="button" data-tab="loginForm">Войти</button>
                    <button class="tabBtn" type="button" data-tab="regForm">Регистрация</button>
                </div>

                <form class="dataentryform" id="loginForm">
                    <!--Вводим электронную почту-->
                    <div class="tabs1">
                        <label>Электронная почта</label>
                        <input id="loginEmail" type="email" name="email" placeholder="Электронная почта" required>
                    </div>
                    <!--Вводим пароль-->
                    <div class="tab2">
                        <label>Пароль</label>
                        <input id="loginPassword" type="password" name="password" placeholder="Введите пароль" required>
                    </div>

                    <button class="btn" type="submit">Войти</button>
                </form>

                <form class="form" id="regForm">
                    <!--Вводим имя-->
                    <div class="row">
                            <label>Имя</label>
                            <input id="regFirstName" type="text" name="firstName" placeholder="Имя" required>
                        </div>
                          <!--Вводим фамилию-->
                        <div class="inputBlock">
                            <label>Фамилия</label>
                            <input id="regLastName" type="text" name="lastName" placeholder="Фамилия" required>
                        </div>
                    <!--Ввод электронной почты-->
                    <div class="input1">
                        <input id="regEmail" type="email" name="email" placeholder="Электронная почта" required>
                    </div>
                    <!--Ввод пароля-->
                    <div class="input2">
                        <input id="regPassword" type="password" name="password" placeholder="Минимум 8 символов" required>
                    </div>
                    <!--Кнопка создания ака-->
                    <button class="btn" type="submit">Создать аккаунт</button>
                </form>
    </main>

    <script src="app.js"></script>  <!-- Связываем с JS-->
</body>
</html>
